- name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # Cambia esto a ./ para que lo suelte en la carpeta asignada al usuario FTP
        server-dir: ./ 
        exclude: |
          **/.git*
          **/.github*
          **/node_modules*
          config.php